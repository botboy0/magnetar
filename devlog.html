<!DOCTYPE html>
<html>
<meta charset="UTF-8">

<head>
    <title>Magnetar</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components/top-strip.css">
    <script src="vendor/anime.umd.min.js"></script>
    <script type="module" src="js/main-browse.js"></script>
</head>

<body>

    <svg width="0" height="0" style="position:absolute">
      <defs>
        <linearGradient id="plasma-chev" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#8b5cf6"/>
          <stop offset="50%" stop-color="#06b6d4"/>
          <stop offset="100%" stop-color="#d946ef"/>
        </linearGradient>
      </defs>
    </svg>

    <header class="topstrip">
      <div class="navigator">
        <button class="navigator-trigger" aria-haspopup="menu" aria-expanded="false" aria-label="Navigate">
          <span class="wordmark">
            <span class="mag">MAGNETAR</span>
          </span>
          <svg class="chev" viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="7 8 12 12 17 8"/>
            <polyline points="7 14 12 18 17 14"/>
          </svg>
        </button>
        <div class="nav-dropdown" role="menu">
          <div class="nav-dropdown-inner"></div>
        </div>
      </div>
    </header>

    <h1>DEVLOG</h1>

    <div class="panel">
        <h3 class="corner">DEVLOG</h3>
        <table>
            <tr><td>Initialize an empty <a href="https://github.com/botboy0/magnetar">GIT</a> repo</td> <td>✅</td></tr>
            <tr><td>Build a basic skeleton website</td><td>✅</td></tr>
            <tr><td>Add some basic minimal CSS and fonts</td><td>✅</td></tr>
            <tr><td>Integrate LÖVE web build (minimal breakout example game)</td><td>✅</td></tr>
            <tr><td>Build an extremely minimal editor</td><td>✅</td></tr>
            <tr><td>Build a more advanced editor v2</td><td>🚧</td></tr>
        </table>
    </div>

</body>

</html>
