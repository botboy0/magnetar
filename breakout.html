<!DOCTYPE html>
<html>
<meta charset="UTF-8">

<head>
    <title>Magnetar - Breakout</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <nav>
        <a href="devlog.html">Devlog</a>
        <a href="index.html">Games</a>
    </nav>

    <h1>MAGNETAR</h1>

    <div id="container" class="game-frame">
        <canvas id="canvas" width="800" height="600" tabindex="-1"></canvas>
        <div id="message-container">
            <div id="message"></div>
            <div id="progress-border"><div id="progress-bar"></div></div>
        </div>
    </div>

    <script>
        var container = document.querySelector("#container");
        var canvas = document.getElementById("canvas");
        var progress_bar = document.querySelector("#progress-bar");
        var complete = false;
        var Module;
        function setFocus() { window.focus(); canvas.focus(); }
        document.addEventListener('contextmenu', e => e.preventDefault());
        canvas.addEventListener("touchstart", () => window.focus());
        canvas.addEventListener("pointerdown", () => window.focus());
        document.addEventListener("pointerdown", () => { container.focus(); setFocus(); });
        for (const key of ["fullscreenchange", "mozfullscreenchange", "webkitfullscreenchange", "msfullscreenchange"]) {
            if (key in document) document.addEventListener(key, () => setFocus());
        }
        function drawMessage(text) { message.innerHTML = text; }
        function drawLoadingStatus(text, current_value, total_value) {
            var ratio = complete ? 1 : 0;
            if (current_value && total_value) ratio = current_value / total_value;
            if (ratio >= 1 || text == 'Running...') { complete = true; ratio = 1; }
            progress_bar.style.width = (ratio * 100) + '%';
            drawMessage(text);
        }
        function onException(exception_message) {
            canvas.remove();
            console.log(exception_message);
            alert('An error has occurred:\n' + exception_message + '\n\nSee JavaScript console.');
            drawMessage('An error has occurred, see JavaScript console');
            Module.setStatus = function(text) { if (text) Module.printErr('[post-exception status] ' + text); };
        }
        window.onerror = function(message) { onException(message); };
    </script>
    <script src="game.js"></script>
    <script src="love.js" onload="applicationLoad(this);"></script>
</body>

</html>
