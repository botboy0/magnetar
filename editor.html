<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Magnetar - Editor</title>
    <link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/components/top-strip.css">
<link rel="stylesheet" href="css/components/dock.css">
<link rel="stylesheet" href="css/components/editor-shell.css">
<link rel="stylesheet" href="css/components/modal.css">
    <script src="vendor/anime.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.47.0/min/vs/loader.js"></script>
    <script type="module" src="js/main-editor.js"></script>
</head>
<body class="editor-body">

    <svg width="0" height="0" style="position:absolute">
      <defs>
        <linearGradient id="plasma-chev" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#8b5cf6"/>
          <stop offset="50%" stop-color="#06b6d4"/>
          <stop offset="100%" stop-color="#d946ef"/>
        </linearGradient>
      </defs>
    </svg>

    <header class="topstrip">
      <div class="navigator">
        <button class="navigator-trigger" aria-haspopup="menu" aria-expanded="false" aria-label="Navigate">
          <span class="wordmark">
            <span class="mag">MAGNETAR</span>
          </span>
          <svg class="chev" viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="7 8 12 12 17 8"/>
            <polyline points="7 14 12 18 17 14"/>
          </svg>
        </button>
        <div class="nav-dropdown" role="menu">
          <div class="nav-dropdown-inner"></div>
        </div>
      </div>
      <div class="project-bar">
        <span class="project-title">untitled</span>
        <svg class="project-pen" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
        </svg>
        <span class="project-caption">A <span class="by">MAGNETAR</span> PROJECT BY trynda</span>
      </div>
    </header>

    <div class="workspace">

      <!-- Dock — 5 icons, click-log only in c3. Panel opening wires in later. -->
      <aside class="dock" aria-label="Tools">
        <button class="dock-icon" data-panel="blueprints" title="Blueprints — your .magnetar files (scenes, entities, configs)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M3 5a2 2 0 0 1 2-2h10l5 5v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="14 3 14 9 20 9"/>
            <line x1="8" y1="13" x2="16" y2="13"/>
            <line x1="8" y1="17" x2="13" y2="17"/>
          </svg>
          <span class="dock-label">Blueprints</span>
        </button>
        <button class="dock-icon" data-panel="assets" title="Assets — sprites, audio, fonts">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <span class="dock-label">Assets</span>
        </button>
        <button class="dock-icon" data-panel="plugins" title="Plugins — editor extensions & community plugins">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15.39 4.39a1 1 0 0 0 1.68-.474 2.5 2.5 0 1 1 3.014 3.015 1 1 0 0 0-.474 1.68l1.683 1.682a2.414 2.414 0 0 1 0 3.414L19.61 15.39a1 1 0 0 1-1.68-.474 2.5 2.5 0 1 0-3.014 3.015 1 1 0 0 1 .474 1.68l-1.683 1.682a2.414 2.414 0 0 1-3.414 0L8.61 19.61a1 1 0 0 0-1.68.474 2.5 2.5 0 1 1-3.014-3.015 1 1 0 0 0 .474-1.68l-1.683-1.682a2.414 2.414 0 0 1 0-3.414L4.39 8.61a1 1 0 0 1 1.68.474 2.5 2.5 0 1 0 3.014-3.015 1 1 0 0 1-.474-1.68l1.683-1.682a2.414 2.414 0 0 1 3.414 0z"/>
          </svg>
          <span class="dock-label">Plugins</span>
        </button>
        <button class="dock-icon" data-panel="output" title="Output — debug output, print, stack traces">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="3" y="4" width="18" height="16" rx="2"/>
            <polyline points="7 10 10 13 7 16"/>
            <line x1="13" y1="16" x2="17" y2="16"/>
          </svg>
          <span class="dock-label">Output</span>
        </button>
        <button class="dock-icon" data-panel="export" title="Export — package & download your work">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M12 3v12"/>
            <polyline points="7 10 12 15 17 10"/>
            <path d="M5 17v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"/>
          </svg>
          <span class="dock-label">Export</span>
        </button>
      </aside>

      <main class="editor-shell">

        <!-- Preview column -->
        <section class="preview-col">
          <div class="panel">
            <div class="panel-header">
              <div class="label">Preview</div>
            </div>

            <div class="preview-stage">
              <!-- Pre-Run identity card. Shows project title + author
                   while the iframe is hidden. main-editor.js writes
                   the project title here at mount and re-renders on
                   rename via the project:titlechange event. Author
                   is hardcoded "trynda" until a real user concept
                   lands; the topstrip caption hardcodes the same. -->
              <div class="preview-title">
                <div class="preview-title-name">untitled</div>
                <div class="preview-title-author">by trynda</div>
              </div>
              <!-- Runtime iframe. Hidden until first Run; main-editor.js
                   sets src + unhides + adds .running to .preview-stage,
                   which hides the title card via CSS. -->
              <iframe class="preview-frame" src="about:blank" hidden allowfullscreen title="Preview"></iframe>
            </div>

            <!-- Preview control strip. Fork click-logs in c3; Run stays unwired until c5. -->
            <div class="preview-strip">
              <button class="btn-run-inline" id="play" title="Run (⌘↵)">
                <svg viewBox="0 0 24 24" class="play-glyph" xmlns="http://www.w3.org/2000/svg"><path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"/></svg>
                <span class="run-label">Run</span>
              </button>
              <button class="btn-fork-inline" id="fork" title="Fork this project">
                <svg viewBox="0 0 24 24" class="fork-glyph" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><path d="M18 9v2c0 .6-.4 1-1 1H7c-.6 0-1-.4-1-1V9"/><path d="M12 12v3"/></svg>
                <span class="fork-label">Fork</span>
              </button>
              <span class="divider"></span>
              <button class="btn-icon" id="btn-restart" title="Restart">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
              </button>
              <button class="btn-icon" title="Pause">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="14" y="3" width="5" height="18" rx="1"/><rect x="5" y="3" width="5" height="18" rx="1"/></svg>
              </button>
              <span class="divider"></span>
              <span class="metric"><span class="k">t</span><span class="v" id="metric-t">—</span></span>
              <span class="metric"><span class="k">fps</span><span class="v" id="metric-fps">—</span></span>
              <span class="metric"><span class="k">res</span><span class="v" id="metric-res">—</span></span>
              <span class="spacer"></span>
              <button class="btn-icon" title="Mute">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M11 4.702a.705.705 0 0 0-1.203-.498L6.413 7.587A1.4 1.4 0 0 1 5.416 8H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2.416a1.4 1.4 0 0 1 .997.413l3.383 3.384A.705.705 0 0 0 11 19.298z"/><line x1="22" x2="16" y1="9" y2="15"/><line x1="16" x2="22" y1="9" y2="15"/></svg>
              </button>
              <button class="btn-icon" id="btn-fullscreen" title="Fullscreen" aria-pressed="false">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M15 3h6v6"/><path d="m21 3-7 7"/><path d="m3 21 7-7"/><path d="M9 21H3v-6"/></svg>
              </button>
            </div>

            <!-- Unified status line.
                 Left: artifact identity (project title, author).
                 Right: runtime status (compile badge, engine versions).
                 Mockup vision includes time-ago and tags too — those
                 need data models that don't exist yet (project.updatedAt
                 timestamp polling, tag store + tag-edit UI), so they're
                 deferred. The structure here is a subset of the mockup,
                 not a different layout. -->
            <div class="status-line">
              <div class="left">
                <span class="meta-title">untitled</span>
                <span class="meta-sep">·</span>
                <span class="meta-dim">by <span class="meta-author">trynda</span></span>
              </div>
              <div class="right">
                <span class="badge idle" id="runtime-badge">Idle</span>
                <span class="meta-sep">·</span>
                <span class="runtime-v">love 12 <span class="meta-sep">·</span> lua 5.1</span>
              </div>
            </div>
          </div>
        </section>

        <!-- Code column -->
        <section class="code-col">
          <div class="panel" style="flex:1;">
            <div class="panel-header">
              <div class="label">Code</div>
              <div class="actions">
                <button class="file-select">— <span class="caret">▾</span></button>
              </div>
            </div>

            <div class="code-stage" id="editor-panel"></div>

            <div class="code-footer">
              <div class="left">lua · love2d</div>
              <div class="right">
                <span>ln —, col —</span>
                <span>·</span>
                <span>— chars</span>
              </div>
            </div>
          </div>
        </section>

      </main>

    </div>



</body>
</html>
